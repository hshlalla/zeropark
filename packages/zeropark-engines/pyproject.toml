[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "zeropark-engines"
version = "0.1.0"
description = "Native, in-process implementations of Zeropark capabilities. OSS projects are design references only."
requires-python = ">=3.11"
dependencies = [
    "zeropark-core>=0.1.0",
    "httpx>=0.27.0",
    "markdownify>=0.13",
    "python-pptx>=1.0",
    "openpyxl>=3.1.0",
    "qdrant-client>=1.8.0",
    "mcp>=1.0.0",
    "networkx>=3.0",
]

[project.optional-dependencies]
browser = ["playwright>=1.49"]
dev = ["pytest>=8.0.0"]
ppt = [
    "langchain-core>=1.0",
    "langchain-anthropic>=1.0",
    "langgraph>=1.0",
    "langgraph-checkpoint>=4.0",
    "langgraph-prebuilt>=1.0",
    "anthropic>=0.100",
    "pandas>=2.0",
    "python-calamine>=0.2",
    "pyarrow>=18.0",
]

[tool.uv.sources]
zeropark-core = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]
